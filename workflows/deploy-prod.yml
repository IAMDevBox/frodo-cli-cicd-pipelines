name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment confirmation
        if: github.event_name == 'workflow_dispatch'
        env:
          CONFIRM_INPUT: ${{ github.event.inputs.confirm }}
        run: |
          if [ "$CONFIRM_INPUT" != "deploy" ]; then
            echo "Deployment not confirmed. Type 'deploy' to proceed."
            exit 1
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frodo-cli

      - name: Install Frodo CLI
        run: npm install -g @rockcarver/frodo-cli

      - name: Pre-deployment backup
        env:
          FRODO_HOST: ${{ secrets.FRODO_PROD_HOST }}
          FRODO_USER: ${{ secrets.FRODO_PROD_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_PROD_PASSWORD }}
        run: |
          mkdir -p backup/journeys backup/scripts backup/oauth
          frodo journey export --all --directory backup/journeys
          frodo script export --all --directory backup/scripts
          frodo oauth client export --all --directory backup/oauth
          echo "Backup complete — $(ls backup/journeys/*.json 2>/dev/null | wc -l) journeys backed up"

      - name: Import Scripts (1st)
        env:
          FRODO_HOST: ${{ secrets.FRODO_PROD_HOST }}
          FRODO_USER: ${{ secrets.FRODO_PROD_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_PROD_PASSWORD }}
        run: frodo script import --all --directory exports/scripts

      - name: Import Journeys (2nd)
        env:
          FRODO_HOST: ${{ secrets.FRODO_PROD_HOST }}
          FRODO_USER: ${{ secrets.FRODO_PROD_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_PROD_PASSWORD }}
        run: frodo journey import --all --directory exports/journeys

      - name: Import OAuth Clients (3rd)
        env:
          FRODO_HOST: ${{ secrets.FRODO_PROD_HOST }}
          FRODO_USER: ${{ secrets.FRODO_PROD_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_PROD_PASSWORD }}
        run: frodo oauth client import --all --directory exports/oauth

      - name: Rollback on failure
        if: failure()
        env:
          FRODO_HOST: ${{ secrets.FRODO_PROD_HOST }}
          FRODO_USER: ${{ secrets.FRODO_PROD_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_PROD_PASSWORD }}
        run: |
          echo "Production deployment FAILED — rolling back..."
          frodo script import --all --directory backup/scripts || true
          frodo journey import --all --directory backup/journeys || true
          frodo oauth client import --all --directory backup/oauth || true

      - name: Production deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Files |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts | $(ls exports/scripts/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Journeys | $(ls exports/journeys/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| OAuth Clients | $(ls exports/oauth/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
