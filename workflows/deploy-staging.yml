name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths:
      - 'exports/**'
  pull_request:
    branches:
      - main
    paths:
      - 'exports/**'

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: python3 tests/validate_json.py exports/

      - name: List changed files
        run: |
          echo "## Changed Configuration Files" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/main...HEAD -- exports/ >> $GITHUB_STEP_SUMMARY || true

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-frodo-cli

      - name: Install Frodo CLI
        run: npm install -g @rockcarver/frodo-cli

      - name: Backup current staging config
        env:
          FRODO_HOST: ${{ secrets.FRODO_STAGING_HOST }}
          FRODO_USER: ${{ secrets.FRODO_STAGING_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_STAGING_PASSWORD }}
        run: |
          mkdir -p backup/journeys backup/scripts backup/oauth
          frodo journey export --all --directory backup/journeys || true
          frodo script export --all --directory backup/scripts || true
          frodo oauth client export --all --directory backup/oauth || true

      - name: Import Scripts (1st — dependency for journeys)
        env:
          FRODO_HOST: ${{ secrets.FRODO_STAGING_HOST }}
          FRODO_USER: ${{ secrets.FRODO_STAGING_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_STAGING_PASSWORD }}
        run: frodo script import --all --directory exports/scripts

      - name: Import Journeys (2nd)
        env:
          FRODO_HOST: ${{ secrets.FRODO_STAGING_HOST }}
          FRODO_USER: ${{ secrets.FRODO_STAGING_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_STAGING_PASSWORD }}
        run: frodo journey import --all --directory exports/journeys

      - name: Import OAuth Clients (3rd)
        env:
          FRODO_HOST: ${{ secrets.FRODO_STAGING_HOST }}
          FRODO_USER: ${{ secrets.FRODO_STAGING_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_STAGING_PASSWORD }}
        run: frodo oauth client import --all --directory exports/oauth

      - name: Rollback on failure
        if: failure()
        env:
          FRODO_HOST: ${{ secrets.FRODO_STAGING_HOST }}
          FRODO_USER: ${{ secrets.FRODO_STAGING_USER }}
          FRODO_PASSWORD: ${{ secrets.FRODO_STAGING_PASSWORD }}
        run: |
          echo "Deployment failed — rolling back to backup..."
          frodo script import --all --directory backup/scripts || true
          frodo journey import --all --directory backup/journeys || true
          frodo oauth client import --all --directory backup/oauth || true

      - name: Deployment summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Files Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts | $(ls exports/scripts/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Journeys | $(ls exports/journeys/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| OAuth Clients | $(ls exports/oauth/*.json 2>/dev/null | wc -l) |" >> $GITHUB_STEP_SUMMARY
